<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Freshwater Fish Activity</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0b1e2d;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .card {
      background: #0f2a3d;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }
    .best-time {
      font-size: 22px;
      font-weight: bold;
      color: #4fd1c5;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">HOURLY BITE WINDOW (FRESHWATER)</div>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <div class="title">BEST TIME TO FISH</div>
  <div class="best-time" id="bestTime"></div>
  <div>Peak activity window</div>
</div>

<div class="card">
  <div class="title">CONDITIONS</div>
  <div>☁️ Cloud Cover: <b>70%</b></div>
  <div>🌡️ Water Temp: <b>68°F</b></div>
  <div>📈 Pressure: <b>Rising</b></div>
  <div>💨 Wind: <b>8 mph</b></div>
</div>

<script>
/* -----------------------------
   TIME LABELS
------------------------------ */
function generateHours() {
  const hours = [];
  for (let i = 6; i < 18; i++) {
    const h = i % 12 || 12;
    const suffix = i < 12 ? "AM" : "PM";
    hours.push(`${h}${suffix}`);
  }
  return hours;
}

/* -----------------------------
   INPUT DATA (Replace with API later)
------------------------------ */
const conditions = {
  solunarPeak: [9,10,11,12,13],
  cloudCover: 70,
  pressureTrend: "rising",
  waterTemp: 68,
  windSpeed: 8
};

/* -----------------------------
   SCORING FUNCTIONS
------------------------------ */
function getSolunarScore(hour) {
  return conditions.solunarPeak.includes(hour) ? 95 : 50;
}

function getSunScore(hour) {
  if (hour <= 7) return 90;        // sunrise bite
  if (hour >= 17) return 85;       // evening bite
  if (hour >= 11 && hour <= 15) return 55; // midday lull
  return 65;
}

function getWeatherScore() {
  let score = 50;

  if (conditions.cloudCover > 60) score += 20;
  if (conditions.pressureTrend === "rising") score += 15;

  // Wind sweet spot (freshwater key factor)
  if (conditions.windSpeed >= 5 && conditions.windSpeed <= 12) {
    score += 15;
  } else if (conditions.windSpeed > 15) {
    score -= 10;
  }

  return score;
}

function getWaterScore() {
  const temp = conditions.waterTemp;

  // Ideal freshwater range (bass/trout general)
  if (temp >= 65 && temp <= 72) return 90;
  if (temp >= 55 && temp <= 80) return 70;
  return 50;
}

/* -----------------------------
   BUILD SCORES
------------------------------ */
function buildScores() {
  const scores = [];

  for (let hour = 6; hour < 18; hour++) {
    const total =
      getSolunarScore(hour) * 0.4 +
      getSunScore(hour) * 0.2 +
      getWeatherScore() * 0.25 +
      getWaterScore() * 0.15;

    scores.push(Math.round(total));
  }

  return scores;
}

/* -----------------------------
   BEST WINDOW (3-hour block)
------------------------------ */
function findBestWindow(scores, hours) {
  let bestIndex = 0;
  let max = 0;

  for (let i = 0; i < scores.length - 2; i++) {
    const sum = scores[i] + scores[i+1] + scores[i+2];
    if (sum > max) {
      max = sum;
      bestIndex = i;
    }
  }

  return `${hours[bestIndex]} - ${hours[bestIndex+2]}`;
}

/* -----------------------------
   RENDER
------------------------------ */
const hours = generateHours();
const scores = buildScores();

new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: hours,
    datasets: [{
      data: scores,
      backgroundColor: "#4fd1c5"
    }]
  },
  options: {
    scales: {
      y: { min: 0, max: 100 }
    },
    plugins: {
      legend: { display: false }
    }
  }
});

document.getElementById("bestTime").innerText =
  findBestWindow(scores, hours);

</script>

</body>
</html>
